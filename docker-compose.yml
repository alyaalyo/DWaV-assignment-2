version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5001:5000"
    environment:
      - PORT=5000

  sender:
    build: ./sender
    depends_on:
      - server
    environment:
      - SERVER_URL=http://server:5000
      - SPEED_FACTOR=10
      - CSV_FILE=/data/ip_addresses.csv
    volumes:
      - ./ip_addresses.csv:/data/ip_addresses.csv:ro
